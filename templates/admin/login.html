<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Undangan Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --sage-50: #f6f7f4;
            --sage-100: #e8ebe3;
            --sage-200: #d4dac9;
            --sage-300: #b5c0a5;
            --sage-400: #96a582;
            --sage-500: #7d8471;
            --sage-600: #5c6352;
            --sage-700: #4a5042;
            --sage-800: #3d4237;
            --sage-900: #343830;
            --ink: #1a1a1a;
            --ink-soft: #5a5a5a;
            --paper: #fafaf8;
            --paper-alt: #f5f5f0;
            --border: #e5e5e0;
            --red-500: #ef4444;
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'Inter', system-ui, sans-serif;
        }
        html { height: 100%; }
        body {
            font-family: var(--sans);
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--paper-alt);
            background-image: radial-gradient(ellipse at 20% 30%, rgba(125,132,113,0.06) 0%, transparent 50%), radial-gradient(ellipse at 80% 70%, rgba(92,99,82,0.04) 0%, transparent 50%);
            padding: 24px;
        }

        .login-wrap { width: 100%; max-width: 420px; }
        .login-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.04);
        }

        .login-header { text-align: center; margin-bottom: 40px; }
        .login-brand { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 24px; }
        .login-brand-icon { width: 44px; height: 44px; background: var(--sage-600); border-radius: 10px; display: grid; place-items: center; color: white; font-size: 22px; }
        .login-brand-text { font-family: var(--serif); font-size: 22px; font-weight: 400; color: var(--ink); letter-spacing: -0.02em; }
        .login-title { font-family: var(--serif); font-size: 28px; font-weight: 400; color: var(--ink); letter-spacing: -0.02em; }
        .login-subtitle { font-size: 14px; color: var(--ink-soft); margin-top: 8px; font-weight: 300; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--ink-soft); margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            transition: all 0.2s;
            background: var(--paper);
        }
        .form-input:focus {
            outline: none;
            border-color: var(--sage-400);
            background: white;
        }
        .form-input::placeholder { color: rgba(90,90,90,0.4); }

        .btn {
            width: 100%;
            padding: 14px 20px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-family: inherit;
            background: var(--sage-600);
            color: white;
            letter-spacing: 0.03em;
        }
        .btn:hover { background: var(--sage-700); }
        .btn:active { background: var(--sage-800); }

        .alert {
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 24px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: var(--red-500);
        }

        .login-footer { text-align: center; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
        .login-footer-link {
            font-size: 13px;
            color: var(--ink-soft);
            text-decoration: none;
            display: inline-flex;
            align-items: center; gap: 6px;
            transition: color 0.2s;
        }
        .login-footer-link:hover { color: var(--sage-600); }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-header">
                <div class="login-brand">
                    <div class="login-brand-icon">🎓</div>
                    <span class="login-brand-text">Undangan Digital</span>
                </div>
                <h1 class="login-title">Login Admin</h1>
                <p class="login-subtitle">Masuk untuk mengelola undangan dan tamu</p>
            </div>

            {{if .error}}
            <div class="alert">{{.error}}</div>
            {{end}}

            <form method="POST" action="/admin/login">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" class="form-input" id="username" name="username" required autocomplete="username" placeholder="admin">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-input" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Masuk</button>
            </form>

            <div class="login-footer">
                <a href="/" class="login-footer-link">
                    <span>←</span>
                    <span>Kembali ke Undangan</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
