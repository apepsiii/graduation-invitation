<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --sage-600: #5c6352; --gray-50: #f9fafb; --gray-200: #e5e7eb; --gray-500: #6b7280; }
        body { font-family: 'Inter', sans-serif; background: var(--gray-50); color: #111827; min-height: 100vh; }
        .navbar { background: white; border-bottom: 1px solid var(--gray-200); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .navbar-brand { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .navbar-links { display: flex; gap: 24px; }
        .navbar-links a { font-size: 13px; color: var(--gray-500); text-decoration: none; }
        .navbar-links a:hover { color: var(--sage-600); }
        @media (max-width: 768px) { .navbar-links { display: none; } }
        .scanner-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; min-height: calc(100vh - 60px); }
        h1 { font-size: 24px; margin-bottom: 8px; color: #0f766e; }
        .subtitle { color: var(--gray-500); margin-bottom: 24px; font-size: 14px; }
        #reader { width: 300px; border-radius: 16px; overflow: hidden; background: #1a1a2e; }
        .result { margin-top: 24px; padding: 24px; border-radius: 16px; text-align: center; min-width: 300px; display: none; color: white; }
        .result.success { background: #5c6352; display: block; }
        .result.error { background: #dc2626; display: block; }
        .result.already { background: #f59e0b; display: block; }
        .result h2 { font-size: 20px; margin-bottom: 8px; }
        .result p { font-size: 14px; opacity: 0.9; }
        .btn { display: inline-block; padding: 10px 20px; background: white; color: #0f766e; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; margin-top: 16px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-dot.scanning { background: #5c6352; animation: blink 1s infinite; }
        .status-dot.idle { background: #f59e0b; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><span>🎓</span><span>Dashboard Admin</span></div>
        <div class="navbar-links">
            <a href="/admin/dashboard">Dashboard</a>
            <a href="/admin/guests">Tamu</a>
            <a href="/admin/guestbooks">Pesan</a>
            <a href="/admin/rundowns">Rundown</a>
            <a href="/admin/galleries">Galeri</a>
            <a href="/admin/settings">Pengaturan</a>
            <a href="/admin/scanner">Scanner</a>
            <a href="/admin/logout">Logout</a>
        </div>
    </nav>
    <div class="scanner-wrap">
        <h1>QR Scanner</h1>
        <p class="subtitle"><span class="status-dot scanning" id="statusDot"></span><span id="statusText">Memulai kamera...</span></p>
        <div id="reader"></div>
        <div class="result" id="result">
            <h2 id="resultTitle">Result</h2>
            <p id="resultMessage">Message</p>
            <button class="btn" onclick="resetScanner()">Scan Lagi</button>
        </div>
    </div>
    <script>
        let html5QrCode;
        let isScanning = false;
        function onScanSuccess(decodedText) {
            if (!isScanning) return;
            isScanning = false;
            html5QrCode.stop();
            document.getElementById('statusDot').className = 'status-dot idle';
            document.getElementById('statusText').textContent = 'Memproses...';
            fetch('/admin/api/scan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ qr_token: decodedText }), credentials: 'same-origin' })
            .then(res => res.json())
            .then(data => {
                const resultDiv = document.getElementById('result');
                resultDiv.className = 'result ' + (data.status === 'success' ? 'success' : data.status === 'already' ? 'already' : 'error');
                document.getElementById('resultTitle').textContent = data.status === 'success' ? 'Berhasil!' : data.status === 'already' ? 'Sudah Check-in' : 'Gagal';
                document.getElementById('resultMessage').textContent = data.guest_name ? data.guest_name + ' - ' + data.message : data.message;
                if (data.status === 'success') { try { new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2teleQYAKI/R7byMRAAEL3bD8tycVQAAO3bD9NulXgAAQHHB9NqmXgAASE5v4eG4l18AADxywfTlqWAAAD5xwfTlqWEAAD9xwfTlqWEAAD9ywvTlqWEAAD9ywvTlqWEAAD5yw/TlqWEAAD5zw/TlqWEAAD10wvTlqWEAAD10w/TlqWEAADx1w/TlqWEAADx2w/TlqWEAAD13w/TlqWEAAD13w/TlqWEAAD14w/TlqWEAAD14w/TlqWEAAD14wvTlqWEAAD14wvTlqWEAAD14wvTlqWEAAD14wvTlqWEAAD14wvTlqWEAAD14wvTlqWEAAD53w/TlqWEAAD93w/TlqWEAAD94w/TlqWEAAD94w/TlqWEAAD94w/TlqWEAAD94w/TlqWEAAD94w/TlqWEAAD94w/TlqWEAAD95w/TlqWEAAD95w/TlqWEAAD95w/TlqWEAAD95w/TlqWEAAD95w/TlqWEAAD95w/TlqWEAAD95w/TlqWEAAD96Q/TlqWEAAD97Q/TlqWEAAD97Q/TlqWEAAD97Q/TlqWEAAD97Q/TlqWEAAD97Q/TlqWEAAD97Q/TlqWEAAD97Q/TlqWEAAD97Q/TlqWEAAD97Q/TlqWEAAD97Q/TlqWEAAD98Q/TlqWEAAD98Q/TlqWEAAD98Q/TlqWEAAD98Q/TlqWEAAD98Q/TlqWEAAD98Q/TlqWEAAD98Q/TlqWEAAD98Q/TlqWEAAD98Q/TlqWEAAD98Q/TlqWEAAD99Q/TlqWEAAD99Q/TlqWEAAD99Q/TlqWEAAD99Q/TlqWEAAD99Q/TlqWEAAD99Q/TlqWEAAD99Q/TlqWEAAD99Q/TlqWEAAD99Q/TlqWEAAD99Q/TlqWEAAD99Q/TlqWEAAD99Q/TlqWEAAD99Q/TlqWEAAD9+Q/TlqWEAAD9+Q/TlqWEAAD9+Q/TlqWEAAD9+Q/TlqWEAAD9+Q/TlqWEAAD9+Q/TlqWEAAD9+Q/TlqWEAAD9+Q/TlqWEAAD9+Q/TlqWEAAD+AQTlqWEAAD+AQTlqWEAAD+AQTlqWEAAD+AQTlqWEAAD+AQTlqWEAAD+AQTlqWEAAD+AQTlqWEAAD+AQTlqWEAAD+AQTlqWEAAD+AQTlqWEAAD+AQTlqWEA').play(); } catch(e) {} }
            })
            .catch(err => { alert('Error: ' + err); isScanning = true; });
        }
        function resetScanner() { document.getElementById('result').style.display = 'none'; startScanner(); }
        function startScanner() { html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess, ()=>{}).then(() => { isScanning = true; document.getElementById('statusDot').className = 'status-dot scanning'; document.getElementById('statusText').textContent = 'Scanning...'; }).catch(err => { document.getElementById('statusText').textContent = 'Kamera tidak tersedia'; }); }
        startScanner();
    </script>
</body>
</html>
